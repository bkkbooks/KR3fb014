body:
  text: 十一分為實以積八百一十九年乘閏法得三百一月六分二十一秒三十二微又以積年乘月得九千八百二十八月共為一萬一百二十九月六分二十一秒三十二微以除實如上數通閏十萬八千七百五十三分八十四秒隨歲實消長歲實內減去十二翔實置閏應加通閏即為次年閏應求各月經朔弦望置天正經朔全分以弦策纍加之其日滿旬周去之各得弦望及次朔日及分秒弦策七日三十八刻二十六分四十八秒二十五微分朔實四之望策一十四日七十六刻五十二分九十六秒半半朔實推盈日古謂之沒視恆氣小餘在沒限己上為有盈以十五日乘之用減氣策餘滿氣盈而一為日加入恆氣大餘內滿旬周去之命甲子算外即得沒限亦名盈限七十八刻一十五分六十二秒五十微以氣策減十六日氣盈二十一刻八十四分三十七秒五十微置氣策減十五日即氣策之小餘
