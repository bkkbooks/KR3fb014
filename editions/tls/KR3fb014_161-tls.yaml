body:
  text: 求正交日辰第八置平交入轉遲疾厤以十二限二十分乘之在初限八十四已下爲初限已上置中限一百六十八以遲疾厤乘分減之餘爲末限置立差三百二十五以初末限乘之加平差二萬八千一百又以初末限乘之置定差一千一百一十一萬減之餘再以初末限乘之滿億爲度不滿退除爲分秒乘法見推經翔遲疾差法卽平交遲疾差置經翔加朔後平交日以遲疾差遲加疾減之其日滿紀法去之命甲子算外卽正交日辰授時加減平交日只用遲疾差大統又以遲疾差用日率八百二十分乘之以所入遲疾限下行度而一所入限雖初限已上不覆減中限遲厤用遲行度疾厤用疾行度爲加減定差而後加減平交推正交加時黃道月度第九置朔後平交日以月平行度一十三度三六八七七乘之爲平交距後度以平行度爲一日置經朔盈縮厤以加減差加減之在盈便爲中積在縮加半歲周爲中積置經朔中積加平交距後度爲冬至距正交定積度置冬至距正交定積度加入冬至加時黃道日度滿黃道宿次去之爲正交加時月離黃道宿度授時於推定朔弦望加時日月宿度條下其推中積先以加減差加減盈縮厤此條連上爲文故但曰經
