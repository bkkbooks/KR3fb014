body:
  text: 度差乘之仍二度三十七分爲小股又爲容半長自之得五度六一六九赤爲容半長畀與寄左相消得數以平方開之得五度七十分爲弧矢容闊又爲小勾以度差乘之得一十三度四十七分八十二秒爲容半長置大弦卽周天半徑以小勾五度七十分乘之以大勾二十三度七十一分而一得一十四度六十三分爲小弦又爲白赤道正交距黃赤道正交半弧弦求得半弧背一十四度六十六分爲白赤道正交距黃赤道正交極數
