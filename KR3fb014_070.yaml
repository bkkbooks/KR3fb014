body:
  text: 求每日午中黃道積度以二至加時黃道日度距所求日午中黃道日度爲二至後黃道積度求每日午中赤道日度置所求日午中黃道積度滿歲象限去之餘爲分後內減黃道積度在黃赤道率餘以赤道率乘之如黃道率而一所得以加赤道積度併所去象限爲所求赤道積度以二至赤道日度加之滿赤道宿次去之卽每日午中赤道日度黃道十二次宿度危十二度六十四分九十一秒入娵訾之次辰在亥奎一度七十三分六十三秒入降婁之次辰在戌胃三度七十四分五十六秒入大梁之次辰在酉畢六度八十八分五秒入實沈之次辰在申井八度三十四分九十四秒入鶉首之次辰在未柳三度八十六分八十秒入鶉火之次辰在午張十五度二十六分六秒入鶉尾之次辰在巳軫十度七分九十七秒入壽星之次辰在辰氐一度一十四分五十二秒入大火之次辰在邜尾三度一分一十五秒入析木之次辰在寅斗二度七十六分八十五秒入星紀之次辰在丑女二度六分三十八秒入玄枵之次辰在子
