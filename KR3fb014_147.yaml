body:
  text: 六分四五六四置第一段平差一十分七二六為泛平積以第一段一差四十七秒七六加減第一段二差前多後少加前少後多減今前少一差俱前少應於四十七秒七六內減九秒三六餘三十八秒四十微為泛平積差另以二除第一段二差九秒三六即折半得四秒六十八微為泛立積差置泛平積一十分七二六加減泛平積差三十八秒四十微前多後少加前少後多減今前多平差俱前多應於一十分七二六內加入三十八秒四十微共積一十一分一十一秒為定平積即定差一千一百一十一萬之數置泛平積差三十八秒四十微加減泛立積差四秒六八前多後少加前少後多減今前少泛平差從第一段一差得故前少應於三十八秒四十微內減四秒六八餘三十三秒七十二微為定平差置泛立積差四秒六八以段限一十二除二次得三微二十五纖為限立差除一秒二十微為一微初除得三微九十纖再除共得七微八十纖又倍段限而一以二微四十纖為一微合數按以段限除泛立差不必二次以一十二只除一次得三微九十纖以段限而一亦三微二十五纖置定平差三十三秒七二以段限十二除一次得二秒八十一微為限定平差又術置遲疾曆日及分以遲疾日率分見立成減餘以其下損益分乘之損益分滿十分乘餘首位進一如率法八百二十分
