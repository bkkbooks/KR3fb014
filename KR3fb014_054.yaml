body:
  text: 春正秋分後三日為秋正每正初日則黃赤道同度求四正赤道宿積度置四正赤道宿全度冬正箕春正壁夏正參秋正翼此據近日所推言之若歲差纍移亦移至別宿以所推四正赤道日度及分減之餘為距後度以赤道宿度纍加之各得四正後赤道宿積度元辛巳歲前冬至加時赤道箕十度以減箕宿全度餘四十分為冬至距後度加斗二十五度二十分積得二十五度六十分纍加赤道宿度為冬至後每宿積度春正加時赤道壁五度七三一二五以減壁宿全度餘二度八九六八七五就整為九秒為春正距後度纍加赤道宿度得春正後每宿積度夏正秋正皆仿此附圖於後赤道宿次赤道積度赤道四正距後積度斗二十五二二十五二冬至後二十五六牛七二三十二四三十二八女十一三五四十三七五四十四一五虛八九五七五五十二七七五五十三一七五危十五四六十八一七五六十八五七五室十七一八十五二七五八十五六七五壁八六九十三八七五春正後二度八九六九奎十六六一百一十四七五十九四九六九
