body:
  text: 日躔曆上餘姚黃宗羲梨洲推二至緯度周天徑一百二十一度七十五分二十五秒秒不用此圍三徑一也以周天三百六十五度二十五分七十五秒三分之半徑六十度八十七分五十秒又為黃赤道大弦又為立弦周天徑半之其謂之大弦者勾為半孤弦故大以別之黃赤道內外半弧背二十四度所測就整赤道當南北極之中北為赤道內南為赤道外冬至黃道極南夏至黃道極北離赤道各二十四度弧背者割圓之法也天體正圓今欲離而入算割平圓之旁狀若弧矢其背曲曰弧背其弦直曰弧弦其中術曰矢半弧背者周天四分之一即周天象限是也半周天乃為全弧背今二分二至各行一象限故用半弧背也此半弧背二十四度為日行緯度二至由二十四度漸退至二分而度盡二分漸進至二至則復為二十四度黃赤道率中所載半弧背乃日行經度故有九十一度三一與此不同當日在緯度弧背二十四度二至之時其於經度弧背方初度也就整者其分就近為度實測二十三度九十分
