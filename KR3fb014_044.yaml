body:
  text: 差置泛平積四百五十一分九十二秒加減泛平差三十五分一十四秒今前多平差俱前多應於泛平積內加泛平差共積四百八十七分六秒為定平積即定差置泛平差三十五分一十四秒加減泛立差六十六秒五十微今前少泛平差從第一段一差來故有前少應于泛平差內減泛立差餘三十四分四十七秒五十微為定平差置泛立差六十六秒五十微以段日一十五日六十二除二次得二十七分為日立差除一十五秒六二為一十微初除得四十二微五七再除共得八十五微一四九三十一微二四為十微三微一二四為一微合之為二十七蓋倍段日而一之也零不用置定平差三十四分四十七秒五十微以段日一十五日六十二除一次得二分二十一秒為日定平差除一十五分六十二秒為一分又術置盈縮曆初末限分秒以大餘定日以小餘乘其下加分萬約為分以加其下積度萬約為度不滿為分秒亦得所求盈縮差此以二日對減之餘乘時刻之零數其分秒多有不合司天者皆用之蓋避三乘方之難也盈初縮末二曆平立合差術曰置立差三十一分分即微以六因之得一百八十六分為加分立差百定秒置平差二分四十六秒倍之得四分九十二秒再加
  hash: sha256:62513eebd0b8ae77da136a2cdf3e48aa89ff95a83f5c9b4689fb671b407119de
