body:
  text: 道差分配之也求四正晨前夜半日度置四正恆氣日及分秒冬夏二至以恆為定春分減盈縮差二日四十刻一四秋分加盈縮差為四正定氣置定氣小餘以其日行度乘之冬正用盈初曆初日下行度一度五一八五夏正用縮初曆初日下行度初度九五一五一六春正距夏正如是九十三日者用縮初曆九十三日下行度初度九九九七三如是九十四日者用其曆九十四日下行度一度秋正距次年冬至如是八十八日者用盈初曆八十八日下行度一度五五如是八十九日者用其曆八十九日下行度一度乘法度乘分則一分為一度十乘分則一分為十分滿度為分不滿為秒所得以減四正加時黃道日度各得四正定氣晨前夜半日度定氣者黃道與赤道同度之時也二至黃赤不同緯而同經二分則經緯俱同故當即以交赤道定為二分曆家平分氣策而日行有盈縮故二分之立與日行相乖日行交赤先恆氣三日故春分減盈縮差而為定氣日行交赤後恆氣三日故秋分加盈縮差而為定氣晨前夜半者此一日之始祿命家凡同日生者其七政皆同用晨前夜半不知分秒推移晨前夜半日下分近五十分者則未及午中已出此度然太陽差不過一度太陰一日相去至十四度餘今亦比一日而同之幾何其術之中哉春正雖與夏正同行赤道之內然夏正從上而下春正從下而上故夏正行度之末為春正初度秋正與冬正同行赤道之
