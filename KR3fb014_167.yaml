body:
  text: 求月離赤道正交宿度第十一置冬至加時赤道度命為冬至正度以象限纍加之各得春分夏至秋分正積度各命赤道宿次去之為四正赤道宿度已見日𨇠曆在冬至後置春正赤道宿度以距差初限加末限減之在夏至後置秋正赤道宿度以距差初限減末限加之為月離赤道正交宿度求正交後赤道積度第十二各置春秋二正赤道所入宿全度以月離赤道正交宿度減之餘為正交後積度置正交後積度以赤道宿次纍加之滿象限去之為半交後又去之為中交後再去之為半交後視各交積度在半象四十五度六五七一五已下為初限已上置象限減之為末限推月離赤道正交後半交白道出入赤道內外度第十三置各交定差度以二十五乘之如六十一而一如六十一度為一度所得視月離黃道正交在冬至後宿度為減夏至後宿度為加皆加減二十三度九十分黃道二至出入赤道內外實數為月離赤道正交後半交白道出入赤道內外度以周天六之一六十度八十七分六十二秒半除之為定差此以多除少少者除準多者用其六八七六二五之數猶割圓以周徑除矢度月離赤道正交後為外中交後為內白赤道正交距黃赤道正交極數一十四度六六為半弧背以矢
