body:
  text: 加分立差一秒八十六微共得四分九十三秒八十六微為初日平立合差纍加加分立差即為每日平立合差加分差定術曰置定平積差五百一十三分三十二秒內減平差二分四十六秒再減立差三十一微餘五百一十分八十五秒六十九微為初日加分置所得加分減其日平立合差即為次日加分以加分積之即為積度縮初盈末二曆平立合差術曰置立差二十七分分即微以六因之測晷分六段故六因之得一百六十二分百定秒為加分立差置平差二分二十一秒倍之得四分四十二秒加入加分立差一秒六十二微共得四分四十三秒六十二微為初日平立合差纍加加分立差即為每日平立合差加分定差術曰置定平積差四百八十七分六秒內減平差二分二十一秒再減立差二十七微餘四百八十四分八十四秒七十三微為初日加分置所得加分減其日平立合差即為次日加分以加分積之即為積度推盈縮加分術曰置盈縮曆初末限大餘減一折半仍以本限乘之得數再以加分立差乘之盈初縮末一百八十六縮初盈末一百六十二寄位另置初日平立合差盈初縮末四萬九三八六
