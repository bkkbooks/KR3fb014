body:
  text: 之得二十三度四加初啇自之一十六度共三十九度四以減下廉餘五千八百四度九六又以八度八十分因之得五萬一千八十三度六四八為從廉併從方共一百七十二萬五千三百四十八度五五七三七五為下法與上法相乘除實一除八餘實八萬二千八百九十四度七一六六次啇四分置一四分於左上為法置一倍初次啇共九度六十四分以乘上廉得一十四萬二千八百九十四度三二二五以減益從方餘一百六十六萬一千八百一十三度五三六八七五為從方置一併初次啇自之得二十三度四二五六加初次啇自之二十三度四共四十六度四六五六以減下廉餘五千七百九十七度五三四四又以九度六十四分乘之得五萬五千八百八十八度二三一六一六為從廉併從方共一百七十一萬七千七百度七六八四九一為下法與上法相乘除實一除四餘一萬四千一百八十六度六四五八六三六次啇八十秒置一八十秒於左上為法置一倍初次三啇得九度六十八分八十秒以乘上廉得一十四萬三千六百五度八二九五以減益從方餘一百六十六萬一千一百二度二九八七五為從方置一併初次三啇自之得二十三度五十分三一四加初次啇三啇自之二
