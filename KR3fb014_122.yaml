body:
  text: 從方共得一百六十五萬四百四度四三五七五八三二八為下法與五啇相乘除實餘三百三十度六八二六三二八九三三七六六啇二秒置初次三四五啇倍之加六啇共得三十三度一三六二乘上廉得四十九萬一千一百七十九度九六三六一二五以減益從方餘一百三十一萬三千五百二十七度八九五七六二五為從方置初次三四五六啇自之得二百七十四度五五二五一二四加初次三四五啇自之之二百七十四度四九八六二四共得五百四十九度三八七五二四以減下廉餘一萬一百六十四度九九六一二四七六又以乘上廉之三十三度一三六二乘之得三十三萬六千八百二十九度二四四五八九二六為從廉併從方共得一百六十五萬三百五十七度二四三五一七六為下法與六啇相乘除實餘六十一分問半弧背四十四度下赤道積度若干答曰四十六度三十分八十五秒置半徑內減矢一十六度五六八二餘四十四度三六八為為黃赤道小弦置黃赤道小弦與黃赤道大股五十六度六八相乘得二千四百八十二度三六八二二二二四以半徑而一得四十度七七八一為黃赤道小股置矢一十六度五六八二自
