body:
  text: 後平交入轉在轉中己下與經朔同厤己上減轉中經翔疾厤變爲遲厤經朔遲厤變爲疾厤交終二十七日二十一刻二十二分二十四秒亦名交周交周者月道出入日道一周之日也月當黃道爲正交亦曰天首亦曰羅㬋自上而下凡七日行九十一度滿一象出黃道外六度爲正半交又自下而上凡七日行九十一度滿一象復當黃道爲中交亦曰天尾亦曰計都此半周皆在黃道外值南謂之陽厤又自下而上凡七日行九十一度滿一象入黃道內六度爲中半交又自上而下凡七日行九十一度滿一象復當黃道是謂一交之終此半周皆在黃道內值北謂之陰厤以日計之得二十七日二十一刻二二二四每一交退天一度四六四一凡二百四十九交退天一周有奇終而復始此卽月行緯度也赤道當南北極之中正交在春正正半交入赤道北十八度中交在春正中半交入赤道北三十度正交在秋正正半交出赤道南三十度中交在秋正中半交出赤道南十八度月道與赤道正交距春秋二正黃赤道正交宿度東西不及十四度三分度之二當朔日月經度相同當望日月經度相對又同緯則相食而正交未必在朔中交未必在望同經而不同緯則不食也
