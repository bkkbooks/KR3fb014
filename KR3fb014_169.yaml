body:
  text: 六度而一得二度四十四分以二十五除六十一亦得二度四四故二十五乘六十一除求每日月離出入赤道內外及白道去極度第十四置每日月離赤道交後初末限在第十二條置象限減之餘為白道積用其積度在中星曆減之餘以其內外差乘之所得百約之百約為秒以加其下積差為每日積差置周天六之一以每日積差減之餘為殘徑度置殘徑度以定差在第十三條乘之為每日月離赤道內外度置象限以每日出入赤道內外度內減外加之為每日白道去極度求每交月離白道積度及宿次第十五置定限度在第十條以初末限在第十二條減之餘以初末限乘之度退為分分滿一日為度為定差正交中交後為加半交後為減置正交後赤道積度在第十二條以定差加減之為月離白道定積度以前宿白道定積度減之各得白道宿次推定朔弦望加時月離白道宿度第十六各以月離赤道正交宿度在第十一條距所求定朔弦望加時月離赤道宿度在第六條此定朔弦望在正交役者為正交後積度滿象限去之為半交後又去之為中交後再去之為半交後視交後積度在半象已下為初限已上用減象限為末限置定限度以初末限減之餘以初末限乘之
