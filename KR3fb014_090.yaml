body:
  text: 又爲立股置大弦六十度八七五以矢四度八四八二減之故黃赤道矢亦名股弦差卽大股黃赤道大句二十三度八十分七十秒又爲半弧弦又爲立句以弦股求句曰以大弦自之得三千七百五度七六五六二五爲弦畀以大股自之得三千一百三十九度二三一八二四爲股畀二畀相較餘五百六十六度七六三三六七六爲正實以平方開之初啇二十度二爲方法二二除四百度次啇三度倍方法得四爲廉法三爲隅法三百除一百二十度三三除九度餘實三十七度七六三三六七六三啇八十分倍初次啇得四六爲廉法八爲隅法八四除三十二度八六除四度八十分八八除六十四分餘實三十二分三三六七六四啇六十秒倍初次三啇得四七六爲廉法六爲隅法六四除二十四分六七除四分二十秒六六除三十六秒不除六六除三十六微餘實三分七十六秒七七六五啇七秒倍初次三四啇得四七六一二爲廉法七爲隅法七四除二分八十秒七七除四十九秒七六除四秒二十微一七除七微二七除一微四十纖七七除四九餘實四十三秒四十一微八七爲不滿一秒得句二十三度八十分六十七秒今就
