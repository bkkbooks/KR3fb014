body:
  text: 相併盈遇疾縮遇遲為異則相減以日率八百二十分乘之置相並或相減所得於本位日率之百於其首位進二以所入遲疾限下行度而一滿行度為一分即為加減差盈遲為加縮疾為減盈疾相減者盈多為加疾多為減縮遲相減者縮多為減遲多為加又術置二差同相並異相減以其限下遲疾捷法乘之即得置經朔弦望日及分秒以加減差加減之即定朔弦望及分又視所求盈縮曆與刻漏立成相同積日日出分若定朔弦望小餘在其下則退一日如命乙丑退為甲子其大餘命甲子算外小餘以發斂收之即合朔時刻定朔干名與後朔干同者其月大不同者其月小內無中氣者為閏月日平行一度月平行十三度十九分度之七一晝夜之間月先日十二度有奇歷二十九日五十三刻有奇復追及日與之同度是為經朔經朔云者謂經行泛常之數也日有盈縮月有遲疾以盈縮遲疾之數損益之始為定朔古人立法未密初用平朔一大一小故日食有在晦及朔二月食有在望前後者漢張衡以月行遲疾分為九道宋何承天以日行盈縮推定小餘故月有三大二小隋劉孝孫劉焯欲遵用其法時議排抵以為迂怪卒不能行唐傳仁均始釆用之至貞觀十九年九月後四月頻大復用平差李淳風麟德甲子元曆方行定朔之法淳風又以晦月頻見故立進朔之法謂朔日小餘在日法四分之三已
