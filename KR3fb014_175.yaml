body:
  text: 授時曆故四卷黃宗羲梨洲撰蓋因郭守敬曆草不傳而作步算之法自漢太初大衍而後伍立一術輒更一元以為起算之根然必上推至七曜齊同之歲曆紀邈遠未易密合元授時術不用積年日法憑本年實測所得氣閏諸應上考下求即以至元辛已為元此為變古之一大端惟所測歲實定為每百年消長一分江氏永謂消長有漸不應總計分數以乘距算此其疏也明大統俗悉遵授時獨不用百年消長之法以至中節相差九刻積年既久差數愈顯後人并歸咎於授時然七政行度有差當隨時實測以合天行至其法實集諸家之大成惜曆草不傳見於明元統所撰大統通軌者尚可考見宣成梅氏據以較授時閏應轉應交應諸已有不同頗疑大統或有改定夫大統既用授時之元合用授時之數乃獨於閏轉諸應數有更則定朔置閏月離交食之期又安所擒衷此梅氏所以不能無疑也梨洲先生撰授時曆故一依本法推算其所創平定立三差及弧矢割圓諸法賴此以存謂非守敬功臣歟宋李希真避地廣中詩云藤州三月作小盡梧州三月作大盡哀哉官曆今不頒憶昔升平淚成陳三作復斯言感慨系之此本傳自武進李氏休從曹君直侍讀借鈔得之兹更詳校正付梓俾言曆者有所考證庶幾告朔餼羊之意也夫癸亥除夕吳興劉承幹跋
