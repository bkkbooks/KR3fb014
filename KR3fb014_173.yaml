body:
  text: 積度以正交赤道宿度加之滿宿次去之各得晨昏月離宿度求每日晨昏月離白道宿次第十九計朔弦望入轉日相距以每日轉定度積之為轉積度以定朔弦望晨昏宿次前後相距計之為相距後度朔後用昏望後用晨朔望晨昏俱用二度相減餘以相距日而一為日差距度多為加距度少為減置每日轉定度以日差加減之為每日行定度自朔至弦所用日差自弦至望又改置定朔弦望晨昏月度以每日行定度纍加之即每日晨昏月離白道宿次授時曆故卷四
