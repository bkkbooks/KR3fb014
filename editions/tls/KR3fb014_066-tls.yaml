body:
  text: 道差分配之也求四正晨前夜半日度置四正恒氣日及分秒冬夏二至以恒爲定春分減盈縮差二日四十刻一四秋分加盈縮差爲四正定氣置定氣小餘以其日行度乘之冬正用盈初厤初日下行度一度五一八五夏正用縮初厤初日下行度初度九五一五一六春正距夏正如是九十三日者用縮初厤九十三日下行度初度九九九七三如是九十四日者用其厤九十四日下行度一度秋正距次年冬至如是八十八日者用盈初厤八十八日下行度一度五五如是八十九日者用其厤八十九日下行度一度乘法度乘分則一分爲一度十乘分則一分爲十分滿度爲分不滿爲秒所得以減四正加時黃道日度各得四正定氣晨前夜半日度定氣者黃道與赤道同度之時也二至黃赤不同緯而同經二分則經緯俱同故當卽以交赤道定爲二分厤家平分氣策而日行有盈縮故二分之立與日行相乖日行交赤先恒氣三日故春分減盈縮差而爲定氣日行交赤後恒氣三日故秋分加盈縮差而爲定氣晨前夜半者此一日之始祿命家凡同日生者其七政皆同用晨前夜半不知分秒推移晨前夜半日下分近五十分者則未及午中已出此度然太陽差不過一度太陰一日相去至十四度餘今亦比一日而同之幾何其術之中哉春正雖與夏正同行赤道之內然夏正從上而下春正從下而上故夏正行度之末爲春正初度秋正與冬正同行赤道之
