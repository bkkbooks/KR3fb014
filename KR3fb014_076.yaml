body:
  text: 三十度七三二二見推黃道宿度下減之餘二度六三八乃入女二度六三八爲黃道子宫界次餘仿此此黃道初交宫界置冬至後赤道亥娵訾積度六十五度三六九六二五以減冬至後六十三度下赤道積度六十四度八九三四餘四十七分五六六二五以黃道一度乘之以赤道度率九五五一而一得四十九分八以加於黃道六十三度下共得六十三度四九八爲亥娵訾危下黃道積度置危六十三度四九八減前女三十二度七九六餘三十度七二爲玄枵黃道界次餘仿此此黃道子宫終界置春分後赤道戌降婁積度四度四九六五六二五以減分後赤道四度留小餘以黃道率一度而一加入黃道積度四度三四四五共得黃道奎四度八八三一爲春分後黃道戌宫初界積度以春分黃道距後積度三度一四六八減之餘爲奎一度七三六三爲黃道戌宫初界宿度四正後黃道十二次積度黃道次初界度黃道每次界度子亥㮙冬至後三十二度七九六女二度六三八三十度七二亥娵訾六十三度九八四危十二度六四三十二度六九九四戌降婁春分後四度八八三一奎一度七三六三十二度三酉大梁三十七度一二七四胃三度七四五六三十度二八五申寅沆六十七度一五五九畢六度八八五二十八度三一
