body:
  text: 日躔厤上餘姚黄宗羲棃洲推天正經翔弦望入盈縮厤置半歲周減去閏餘分卽天正經翔入縮厤自秋分後三日至冬至皆縮末厤閏餘者縮末未盡之數至冬至入盈初以弦策累加之各得弦望及次翔入盈縮厤日及分秒滿半歲周去之元是縮厤交入盈厤元是盈厤交入縮厤凡遇半歲周卽盈縮相代半歲周一百八十二日六十二刻一十二分五十秒上考下驗隨歲周爲消長求盈縮差視盈初盈末縮初縮末四厤各在其限已下爲初限已上置半歲周以所得分減之餘爲末限在盈初縮末厤置立差三十一以初末限乘之置立差三十一微盈縮之分起十微上十進一位百進二位千進三位萬進四位加平差二萬四千六百又以初末限乘之平差本二分四十六秒然乘法置萬千百位盈縮厤萬起萬位千起千位十萬方進一位用置定差五百一十三萬三千二百以所乘得數減之餘又以初末限乘之定差亦分秒未滿萬然乘法置于萬千百位盈縮厤萬起萬位十萬方進一位滿億爲度不滿退除爲分秒平差定差乘時皆移分位于萬自分至度凡四位自萬至億亦四位故滿億爲度在縮初盈末厤置立差二十七以初末限乘之加平差二萬二千一百又以初末限乘之置定差四百八十七萬六百減乘得數餘又以初末限乘之滿億爲度不滿退爲分秒卽所求盈縮差乘法同上
