body:
  text: 道半弧弦置黃道半弧弦一度自之如故為弦畀置黃赤道小股五十六度一九二自之得三千一百三十八度一五七六八六四為股畀二畀相併得三千一百三十九度一五七六八六四以平方法開之得五十六度二八一為赤道小弦弧中以至黃道小句股隅置黃道半弧弦一度以半徑乘之仍半徑以赤道小弦而一得一度八六五為赤道半弧弦置黃赤道小股五十六度一九二以乘半徑得三千四百一十度一六八八以赤道小弦而一得六十度八六五三為赤道橫大句置半徑內減赤道橫大句餘九十七秒為赤道橫弧矢置赤道橫弧矢自之得九十四微九自法見上以周徑而一得七十七纖為赤道背弦差置赤道半弧弦一度八六五內加赤道背弦差為赤道積度今背弦差在微以下不加即半弧弦為赤道積度問半弧背二度下黃赤道矢度若干答曰三分二十八秒置半弧背二度自之得四度為半弧背畀置周徑自之得一萬四千八百二十三度六二五為徑畀又為上廉二畀相乘得五萬九千二百九十二度二五為正實置徑畀以周徑乘之得一百八十萬四千七百七度八五九三七五為益從方置半弧背倍
