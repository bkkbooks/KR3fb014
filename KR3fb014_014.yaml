body:
  text: 月二十五日丁未之景相較餘三分五釐爲晷差以丁未戊申二日景相較餘六分爲法而一得五十八刻用加相距日四千四百刻折中加半日刻共爲二千二百七十九刻百約爲日命初起距日癸亥算外得冬至乙酉日夜半後七十九刻定歲實術曰取前人所測日景所得冬至日時刻分秒距今見測到冬至日時刻分秒共計若干爲實以相距積年爲法而一得歲實假如庚辰歲元至元十七年十一月所測日景推得己未日夜半後六刻卽丑初一刻上取劉宋大明五年辛丑歲十一月祖沖之所測日景推得初三日乙酉夜半後三十二刻六十九分爲準以相距積八百一十九年閒共得二十九萬九千一百三十四日內加庚辰歲測到六刻咸去劉宋大明五年測到三十二刻六十九分餘二十九萬九千一百三十三日七十三刻三十一分爲實以相距積年八百一十九而一得三百六十五日二十四刻二十六分五十三秒據授時所測冬至丁丑歲元至元十四年至戊寅歲至元十五年歲實三百六十五日二十五刻半戊寅歲至己夘歲實三百六十五日二十四刻己夘歲至庚辰歲實三百六十五日二十四刻何以不定爲歲實而必以積年一之者太陽之歲行不等久而積差數千百年以上始有定法然不一而一之所
