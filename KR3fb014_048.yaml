body:
  text: 縮初盈末四萬四三六二以本限乘之得數與寄位相倂萬約爲分各減其初日加分餘爲本日加分假如萬厤二十四年丙申歲閏八月朔縮初厤九十二萬零不用減一折半得四十五限半仍以本限九十二乘之得四千一百八十六限與加分立差一百六十二乘之置限數千位加分立差之百進二位十進一位得六十七萬八一三二萬卽分寄位另置平立合差四萬四三六二以本限九十二乘之得四百八萬一三四萬卽分倂寄位得四百七十五分九四三六另置初日加分四百八十四分八四七三減所得分餘八分九三七爲九十二日下加分推盈縮積度術曰置立差盈初縮末三十一縮初盈末二十七以初末限乘之得數加平差盈初縮末二萬四六縮初盈末二萬二一又以初末限因之另置定差盈初縮末五百一十三萬三二縮初盈末四百八十七萬六以所得減之餘再以初末限因之爲盈縮積度假如萬厤二十四年八月翔縮初厤九十二日置立差二十七分以九十二日因之得二千四百八十四分加平差二萬二千一百分共得二萬四五八四又以九十二因之得二百二十六萬一七二八卻置定差四百八十七萬六分內減之餘二百六十萬八八七二已上萬卽分再以九十二因之得二萬四九二一六三一四此萬乃實數爲縮初九十二日下積度
