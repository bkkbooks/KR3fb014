body:
  text: 置天正冬至加時赤道日度以初度下赤道率而一以加黃道初度即冬至加時黃道日度按授時曆經置冬至赤道日度以其赤道積度減之餘以黃道率乘之如赤道率而一夫四正皆起初度赤道黃道未有積度也然則減於何減乎此授時下語之失大統不解推冬至初度認箕五度作至後五度乃用至後五度下赤道積度五度四二九四減之不及減以四度下赤道積度四度三四四五減之以其下赤道率一度八四九而一謬戾之極從授時一語俑之也求四正加時黃道日度以冬至加時赤道度與黃道度相減餘為黃赤道差置本年冬至赤道日度減歲差即為次年冬至赤道日度以初度下赤道率而一即為次年冬至黃道日度相減為次年黃赤道差置所求年黃赤道差與次年黃赤道差相減餘以四而一四秒得一秒加入歲周象限內為四正定象度置冬至加時黃道日度以四正定象度纍加之滿黃道宿次去之各得四正定氣加時黃道宿度四正既有加時赤道日度矣曷不以赤道變黃道術求之哉蓋四正之中唯冬至從中積來有餘分可變三正皆因加象限而得黃赤道率者象限之積度也三正於象限外既無餘積故須準之冬正折取黃赤
