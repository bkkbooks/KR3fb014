body:
  text: 立夏四月節小滿四月中芒種五月節夏至五月中小暑六月節大暑六月中立秋七月節處暑七月中白露八月節秋分八月中寒露九月節霜降九月中立冬十月節小雪十月中大雪十一月節冬至十一月中小寒十二月節大寒十二月中推中氣去經朔置天正閏餘以日周約之爲日得冬至去經朔以月閏累加之各得中氣去經朔日算月閏加閏餘至滿朔策則去之置閏然俟定朔無中氣者裁之
