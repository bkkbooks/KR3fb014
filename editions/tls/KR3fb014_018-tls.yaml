body:
  text: 歲實者下算尤簡求次氣置天正冬至日分以氣策累加之其日滿旬周去之外命如前各得次氣日辰分秒氣策十五日二千一百八十四分三十七秒半置歲實以二十四氣除之爲氣策上考下驗隨歲實消長推天正經翔置中積加閏應爲閏積滿翔實去之不盡爲閏餘再置通積減閏餘爲翔積滿旬周去之不盡以日周約之爲日不滿爲分秒卽所求天正經翔上考置中積減閏
