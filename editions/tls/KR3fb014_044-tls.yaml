body:
  text: 差置泛平積四百五十一分九十二秒加減泛平差三十五分一十四秒今前多平差俱前多應於泛平積內加泛平差共積四百八十七分六秒爲定平積卽定差置泛平差三十五分一十四秒加減泛立差六十六秒五十微今前少泛平差從第一段一差來故有前少應于泛平差內減泛立差餘三十四分四十七秒五十微爲定平差置泛立差六十六秒五十微以段日一十五日六十二除二次得二十七分爲日立差除一十五秒六二爲一十微初除得四十二微五七再除共得八十五微一四九三十一微二四爲十微三微一二四爲一微合之爲二十七蓋倍段日而一之也零不用置定平差三十四分四十七秒五十微以段日一十五日六十二除一次得二分二十一秒爲日定平差除一十五分六十二秒爲一分又術置盈縮厤初末限分秒以大餘定日以小餘乘其下加分萬約爲分以加其下積度萬約爲度不滿爲分秒亦得所求盈縮差此以二日對減之餘乘時刻之零數其分秒多有不合司天者皆用之蓋避三乘方之難也盈初縮末二厤平立合差術曰置立差三十一分分卽微以六因之得一百八十六分爲加分立差百定秒置平差二分四十六秒倍之得四分九十二秒再加
  hash: sha256:d17d5908c39939e3356728d3be5c49521a6ed0447726bfeef0a86c085034bc98
