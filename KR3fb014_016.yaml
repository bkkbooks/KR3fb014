body:
  text: 謂歲實亦平行之數比於測景所得必有纍黎氣應五十五萬六百分即辛巳歲前至元十七年冬至在己未日以旬周計之便為此歲氣應按丁丑歲至元十四年氣應三十九萬三十二百五十分至辛已歲前用加三歲實滿旬周去之餘五十五萬五百二十五分較少七十五秒此六百分者就整也旬周亦名紀法六十萬日周一萬通餘五萬二千四百二十五分歲實內不滿旬周者則為通餘以通餘乘積年比乘
