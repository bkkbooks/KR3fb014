body:
  text: 外然冬正從下而上秋正從上而下故冬正行度之末爲秋正初度求四正後每日晨前夜半黃道日度以四正定氣日距後正定氣日爲相距日以四正定氣晨前夜半日度距後正定氣晨前夜半日度爲相距度累計相距日之行定度卽盈縮厤之積度秋正距冬正冬正距春正如是八十八日者用行積度九十度四九三五如是八十九日者用行積度九十一度四一四四一春正距夏正夏正距秋正如是九十三日者用行積度九十度五九九如是九十四日者用行積度九十一度五九八七與相距度相減餘如相距日而一爲日差相距度多爲加相距度少爲減置四正後每日行度見立成以日差加減爲每日行定度置四正晨前夜半日度以行定度累加之滿黃道宿次去之爲每日晨前夜半日度元辛巳歲前冬正五十五日六刻加歲象限九十一日三一六二五減盈縮極差二日四一四得一百四十三日爲春正定氣減前正定氣五十五日餘八十八日爲相距日餘仿此假如萬厤己亥歲春正夜半日度九十四度九六三九四內減冬至夜半日度四度五五四三三四餘九十度四六六爲相距度餘仿此推求每日午中黃道日度置其日行定度半之以加其日晨前夜半黃道日度得午中黃道日度
