body:
  text: 流立夏一日三時六芒種一日九時周小暑二日二時二立秋二日七時四白露三日零六刻寒露三日六時至立冬三日十一二大雪四日四時四小寒四日九時六五日三時交新歲節遇子時加一日此爲揀法君須記年求月法甲乙丙丁戊己庚辛壬癸以上年名丙戊庚壬甲丙戊庚壬甲寅月爲始以次順推所謂甲已之年丙作首也甲已之年丙作首乙庚乙歲戊爲頭丙辛之歲尋庚上丁壬二位順行流若言戊癸何方發甲寅之上好追求曰求時甲乙丙丁戊已庚辛壬癸以上曰名甲丙戊庚壬如甲曰則甲子起算乙曰則丙子起算所謂甲已還加甲言庚丙作初也甲已還加君庚丙作初丙辛從戊起丁壬庚子居戊癸何方癸壬子是眞途納音生於納甲虛乾坤不用故易曰先庚後庚卽納音也土火水金木宫徴羽商用一三五七九
