body:
  text: 乘上廉得二百四十度一三三六一二五以減益從方餘一百八十萬四千四百六十七度七二五七六二五爲從方置初次啇八十二秒自之得六十七微加初啇八十秒自之之數得一秒三十一微以減下廉餘二百四十三度四九九八六九以前所得一分六十二秒乘之得三度九四四六九七八七七八爲從廉併從方共得一百八十萬四千四百七十一度六七四六三七七八爲下法與上法相乘置二秒本位乘下法進六位除實餘二十五度四三八三不足一秒不用求得矢度八十二秒卽授時厤元所謂立天元一也問黃道半弧背一度下赤道積度若干答曰一度八分六十五秒置半徑六十度八七五內減矢度八十二秒餘六十度八六六八爲黃赤道小弦置黃赤道小弦以黃赤道大股五十六度二六八乘之得三千四百一十度一七二三二四以黃赤道大弦六十度八七五而一得五十六度一九二爲黃赤道小股置矢度八十二秒自之得六十七微以周徑而一除一十二微一七五爲一十纖得五十五纖爲黃道半背弦差置黃道半弧背一度內減黃道亦背弦差餘爲黃道半弧弦今半背弦差在微以下不減卽一度爲黃
  hash: sha256:eebbad1810752c7f1165c9582fb1a25f0fba90c7e2969873d46ebdad8063639a
