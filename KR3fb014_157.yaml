body:
  text: 下弦二百七十三度九十四分三十一秒少上弦度周天象限望度半周天下弦度周天四之三按月平行一日得一十三度三六八七五乘弦策得九十八度六九六七七八七九二一八七五此加時定積度自朔至上弦依日行己積七度有奇加周天象限則與月平行乘弦策合也月平行乘望策得一百九十七度三九三五五七五八四三七五加時定積度自朔至望依日行已積十四度有奇加半周天則與月平行乘望策合也月平行乘三弦策得二百九十六度九三三六三七六五六二五加時定積度自翔至下弦依日行已積二十三度有奇加周天四之三則與月平行乘三弦策合也推黃道變赤道月度第六置定朔弦望加時黃道月行定積度滿象限去之在象限已下及半歲周去之為至後滿象限及三象去之為分後以其黃道積度減之餘以赤道率乘之如黃道率而一用加其下赤道積度得數若干復加所去象限為赤道加時定積度置赤道定積度加入冬至加時赤道日度滿赤宿次去之為定翔弦望加時赤道月度推朔後平交入轉遲疾曆第七置交終日及分內減經朔入交泛日及分推入交泛日見交會曆為朔後平交日置朔後平交日加經朔入轉日為朔
