body:
  text: 從方共得一百七十六萬二千六百一十七度二三四三七五爲下法與初啇相乘除實餘一千一百七萬一干二百七十六度六五六二五次啇六度置初啇倍之得二十度加次啇六度共二十六度以乘上廉得三十八萬五千三百九十九度六二五以減益從方餘一百四十一萬九千三百八度二三四三七五爲從方置初次啇一十六度自之得二百五十六度加初啇自之之一百度共得三百五十六度以減下廉餘一萬三百五十八度又以乘上廉之二十六度乘之得二十六萬九千三百八度爲從廉併從方共得一百六十八萬八千六百一十六度二三四三七五爲下法與次啇相乘除實餘一十三萬九千五百七十九度二五三啇五十分置初次啇倍之加三啇共得三十二度五十分乘上廉得四十八萬一千七百四十九度五三一二五以減益從方餘一百三十二萬二千九百五十八度三二八一二五爲從方置初次三啇自之得二百七十二度二五加初次啇自之之二百五十六度共得五百二十八度二五以減下廉餘一萬一百八十五度七五以乘上廉之三十二度五乘之得三十三萬一千三十六度八七五爲從廉併從方共得一百六十五萬三千九百九十五度二三一二五爲下法與
