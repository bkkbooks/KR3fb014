body:
  text: 推赤道十二次宿度術曰置周天三百六十五度二十五分七十五秒以十二而一得三十度四三八一二五爲赤道每宫次界度半之得十五度二一九六二五乃一宫之正中爲赤道半宫次界度置子玄枵正中虛六度加前女十一度三五共一十七度三五減去半宫界次十五度二一九六二五餘女二度一三九三五是赤道子玄枵宫次初界度七政四餘皆從此界入子宫置赤道每宫次界度三十度四三八一二五減去女後度是二度三九三七五之外九度二一九六二五再減虛八度九五七五餘爲危十二度二六一五六二五是亥娵訾宫次初界度餘宫仿此求四正後赤道積次度曰赤道宿箕十度四十分辛巳歲前冬至日𨇠赤道箕十度餘四十分爲距後度加赤道斗二十五度二牛七度二又加赤道子玄枵次初界女二度一三九三七五共得三十四度九三九三七五爲冬至後赤道積度以累加每宫次赤道三十度四三八一二五爲各宫初次赤道積度如滿歲周象限去之爲春分後積度累滿去之爲夏至爲秋分爲次年冬至後各積度赤道宿次宫界赤道積度四正後赤道積度子玄枵女二度一三十四度九三冬至後三十四度三九三七五九三七五九三九三七五
