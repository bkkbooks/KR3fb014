body:
  text: 五四七以平方法開之得五十六度三二三一六為赤道小弦弧中以至黃道小句股隅置黃道半弧弦二度以半徑乘之得一百二十一度七五以赤道小弦而一得二度一七二八為赤道半弧弦置黃赤道小股五十五度九九六六一二以乘半徑得三千四百八度七九三七五五五以赤道小弦而一得六十度八三六二為六道橫大句置半徑內減赤道橫大句餘三分八八為赤道橫弧矢置赤道橫弧矢自之得一十五秒五四四以周徑而一得一十二微為赤道背弦差置赤道半弧弦二度一七二八內加赤道背弦差為赤道積度今背弦差在微以下不加即半弧弦為赤道半弧背置一度下積度一度八六五與二度下積度二度一七二八相減餘一度八六三為黃道一度下赤道度率後仿此置一度下矢度八十二秒與二度下矢度三分二十八秒相減餘二分四六為黃道一度下差率後仿此問半弧背二十四度下黃赤道矢度若干答曰四度八十四分八十二秒與法見緯度下問半弧背二十四度下赤道積度若干答曰二十五度七十七分五十二秒置半弦內減矢四度八四八二餘五十六度二六
