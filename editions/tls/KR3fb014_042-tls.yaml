body:
  text: 晷差每段積日得一十五日六十二刻就整每段各測晷差若干積日積差第一段一十五日六十二刻七千五十八分九九四第二段三十一日二十四刻一萬二千九百七十八分六五八第三段四十六日八十六刻一萬七千六百九十六分六七九第四段六十二日四十八刻二萬一千一百五十分七二九六第五段七十八日一十刻二萬三千二百七十八分四八六第六段九十三日七十二刻二萬四千百一十七分六二四四二差一差平差一分三十三秒三十六分四十七秒四百五十一分九十二秒一分三十三秒三十七分八十秒四百一十五分四十五秒一分三十三秒三十九分一十三秒三百七十七分六十五秒一分三十三秒四十分四十六秒三百三十八分五十二秒四十一分七十九秒二百九十八分六秒二百五十六分二十七秒已上推平差一差二差術值盈初縮末二厤同置第一段平差四百五十一分九十二秒爲泛平積以第段一差三十六分四十七秒加減第一段二差一分三十三秒前多後少加前少後多減今前少一差俱前少於一差內減二差餘三十五分一十四秒爲泛平積差另置第一段二差折半得六十六秒五十微爲泛立積
