body:
  text: 如問半弧背一度下黃赤道矢度若干答曰八十二秒微以下不用置半弧背一度自之如故為半弧背畀置周徑一百二十一度七五自之得一萬四千八百二十三度六二五為徑畀又為上廉二畀相乘得一萬四千八百二十三度六二五為正實置徑畀以周徑乘之得一百八十萬四千七百七度八五九三七五為益從方置半弧背一度倍之得二度以周徑乘之得二百四十三度五十分為下廉初啇八十秒為上法乘上廉得一百一十八度五八四五以減益從方餘一百八十萬四千五百八十九度二七四八七五為從方置初啇本位十度進一位百進二位千進三位而乘置初啇八十秒自之得六十四微置秒自之得微者蓋八十秒自之原得六十四分而此下算以萬位定分以分位積萬秒當其乘時積六千四百秒便為六十四分及得數則視以萬定分之位此六十四在微位也度從度位乘得度為度分從度下二位乘得分為秒秒從度下六位乘滿度始為分以減下廉餘二百四十三度四九九九三六以八十秒乘之得一度九四七九九九四八八置八十秒本位進一位起十為從廉併從方共得一百八十萬四千五百九十一度二二二八七四四八八為下法與上法相乘除實置八十秒本位進四位為下法之萬乘之餘二百八十六度三三二七一七四九六次啇二秒為上法置初啇八十秒倍之得一分六十秒加次啇共一分六十二秒
