body:
  text: 數然以平行除轉分為轉終度三百六十八度三七八比周天益三度一一三三夫轉周者為周天之一轉也其度惡可不合則是明天之轉尚強用改轉終日二十七日三千二百五十八分於原分減二十二刻八十八分始與周天合矣其周限轉差一一須改詳別本此依授時原分為法轉中十三日七千七百七十三分半轉終求遲疾差第三置遲疾曆日及分以十二限二十分乘之日法萬分以八百二十分為一限一日得十二限餘一百六十分今就整為二十分故以此乘乘法限位在萬分位在千在初限已下為初限已上置中限以遲疾曆乘分減之餘為末限置立差三百二十五在本位以初末限乘之限在百位十限進一位加平差二萬八千一百在本位又以初末限乘之限在萬位十限進一位置定差一千一百一十一萬減之餘再以初末限乘之限位在百萬十萬進一位滿億為度不滿退除為分秒即得遲率差周限三百三十六日法萬分限法八百二十分轉終二十七日五十五刻四十六分得限三百三十六初限八十四四分周限猶日行象限
