body:
  text: 氣朔曆餘姚黃宗羲梨洲積年辛巳歲即元至元十八年距今作曆故之歲丙辰積三百九十六年推冬至置所求距歲減一以歲實乘之為中積加氣應為通積滿旬周去之不盡以日周約之為日不滿為分其日命甲子算外即所求冬至日辰及分如上考者亦距辛巳歲即算乘歲實為中積減氣應為通積滿旬周去之不盡更置旬周以不盡者減之餘同上歲實亦名歲周三百六十五萬二千四百二十五分上考者每百年周天消一秒歲實長一分下驗每百年周天長一秒歲實消一分劉宋祖沖之取至前後二十三四日間晷影折取其中定為冬至且以日差比課推定時刻宋皇祐間周琮則取立冬立春二日之景以為去至既遠日差頗多易為推考授時取前後日率相埒者自遠日以及近日無不可測舊法用八尺表授時用長表四丈為八尺者五既定分至然後可定歲實測景術曰置冬夏二至前後日之相對者以圭表所測正午晷景日日識之相減為晷差進二位為實次
