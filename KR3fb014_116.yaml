body:
  text: 爲廉法五爲隅法除實五百二十五度三啇二十分倍初次啇得一一爲廉法二爲隅法除實二十二度四十分四啇六分倍初次三啇得一一四爲廉法六爲隅法除實六度六十二分七十六秒五啇八十秒倍初次三四啇得一一五二爲廉法八爲隅法除實八十八分四十二秒二四六啇八秒倍初次三四五啇得一一五三六爲廉法八爲隅法除實八分八十四秒二九四四餘實二十九秒七九一五不滿一秒置半徑內減赤道横大句餘五度六六二爲赤道横弧矢置赤道横弧矢自之得三十一度四二九四七八四四以周徑而一得二十五分八一爲赤道背弦差加入赤道半弧弦二十五度五一七一內共二十五度七七五二爲赤道積度問半弧背四十四度下矢度若干答曰一十六度五十六分八十二秒置周徑自之得一萬四千八百二十三度六二五爲徑畀又爲上廉置半背四十四度自之得一千九百三十六度爲背畀以乘徑畀得二千八百六十九萬七千四百四十九度爲正實置徑畀又乘周徑得一百八十萬四千七百七度八五九三七五爲益從方益從方九十一度皆同倍半背得八十八度以乘周徑得一萬七百一千四度爲下廉初啇一十度置初啇乘上廉以減益從方餘一百六十五萬六千四百七十七度二三四三七五爲從方置初啇自之得一百度以減下廉餘一萬六百一十四度以初啇一十度乘之得一十萬六千一百四十度爲從廉併
