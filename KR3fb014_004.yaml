body:
  text: 授時曆西法歌授時之法君西知但以九年舊曆推古但看九年兔望日便是今年正月一月大月小起初一看其初一天干支推九年前每月初一是何干支便以此干支依後去推去大月天四地八耦如大月初一甲子甲至戊五數也子至申九數也即以戊申為今月朔日小月天四地八耦如小月初一日丙寅丙至已四數也寅至酉八數也即以已酉為今月朔古前九之任起算法大月五九小四八月大三十無差如初一日己酉數至次月朔見己卯即大月也月小分明只草九如月朔數至次月朔止草九日即月小也節氣只九年曆假若造甲午年曆則看丙戌年節氣自知二十四氣真端的天干三數地支七假如癸亥日癸見乙三數亥見已七數熟記心中須厯厯定時二十四年取逢時遇八君無慮如逢子時交節氣卻用未時亦交也中氣如之若依此法箇中推方省陰陽元奧處閏月本來中氣無何勞物外更他圖世人諳得神仙術不是愚民是丈夫又歌曰九年二月半便是正月一前九年二月十五日辰即今年正月初一日辰該九十七箇半月二千八百八十日六甲轉四十八周只九年中取大小無失又歌曰歌曰若西求春相衝對食神假如前九年甲子日立春甲食丙子衝午即今年丙午日立春也二十四氣準此閏月無中氣説與惺惺人推閏歌括曰欲知來歲閏先算至之餘更看大小盡決定不肛殊且如今年十一月二十二日冬至則本月尚餘八日則來年之閏當在八月或小盡則七月如來歲置看今年冬至後餘幾日即閏幾月若冬至在上旬則以望為斷十二日足復起一數推節氣歌括云中氣與節氣但有半月隔若要知仔細肉時零五刻謂如正月君子日子時初初刻立春則數至已卯日寅時正一刻即是雨水也又求節氣歌曰驚蟄五時二刻求淸明十時四刻
