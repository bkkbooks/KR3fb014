body:
  text: 相對日景相減為實前後相對日景以最高最低為準其前後相對日則月景長短大略相似故四減以為晷差進二位實如法而一滿法為一刻最高前少後多為減差前多後少為加差最高則月景短猶日之夏至前後者最高之前後多少者景之長短最低前多後少為減差前少後多為加差最低則月景長猶日之冬至漏記積日起日至本日若干刻加本日夜半後月到天心若干刻減起日夜半後月到天心若干刻實得若干刻各以加減差加減之得數半之命起日算外滿百刻為日以發斂收之為時刻及分為月到最高最低處測轉終術曰視月在天以大星距而測之識在某宿某度分秒日時刻數待二十六七日又測月在某宿
