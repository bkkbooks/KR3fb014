body:
  text: 某度分秒日時刻數一歲之中十三周有奇十歲之中一百三十二周有奇百歲之中一千三百二十五周有奇千歲之中約一萬三千二百五十五周取前史所載月淩犯某宿某星眞者幾事累計之以前人所測月到日時刻分距今所測月到日時刻分共積幾十幾萬幾千幾百幾十幾日時刻分爲實另置萬章之月周二百五十一萬八千四百七十二以十九萬除之得每歲月周一十三周二五五一一七以距積年若干乘之得月周若干爲法以除前實得轉終轉應一十三萬一千九百四分辛巳歲前十一月經朔距入轉日大統改用一十三萬二百五分求弦望及次朔入轉第二置天正經朔入轉日及分以弦策累加之滿轉終去之卽弦望及次朔入轉日及分秒徑求次朔以轉差加之轉差一日九十七刻五十九分九十三秒朔實內減轉終餘數求經朔弦望入遲疾厤各視入轉日及分秒在轉中已下爲疾厤已上減去轉中爲遲厤轉者依二十八宿而定月之行也初日月在某宿歷二十七日有奇月仍在某宿此謂行天一
