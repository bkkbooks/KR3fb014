body:
  text: 三啇相乘除實餘一十一萬二千五百八十一度六四八四三七五四啇六分置初次三啇倍之加四啇共得三十三度六分乘上廉得四十九萬五四四六二五以減益從方餘一百三十一萬四千六百五十七度四一三一二五爲從方置初次三四啇自之得二百七十四度二三三六加初次三啇自之之二百七十二度二五六得五百四十六度四八三六以減下廉餘一萬一百六十七度五一六四又以乘上廉之三十三度六乘之得三十三萬六千一百三十八度九二一八四爲從廉併從方共得一百六十五萬七百九十五度五五三九爲下法與四啇相乘除實餘一萬三千五百三十三度九一八一一八九六五啇八十秒置初次三四啇倍之加五啇共得三十三度一二八乘上廉得四十九萬一千五十八度四一四五以減益從方餘一百三十一萬三千六百四十九度四四四八七五爲從方置初次三四五啇自之得二百七十四度四九八六二四加初次三四啇自之之二百七十四度二三三六共得五百四十八度七三二二二四以減下廉餘一萬一百六十五度二六七七七六又以乘上廉之三十三度一二八乘之得三十三萬六千七百五十四度九九八八三三二八爲從廉併
