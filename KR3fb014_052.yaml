body:
  text: 周天之秒位在分上周應亦名度應三百一十五萬一千七十五分起虛七度至箕十度之數也辛巳歲前至元十七年冬至加時太陽所在歲差一分五十秒周天之度周歲之日皆三百六十有五全策之外又有奇分皆四分之一各二十五分然今歲冬至日行至某處在某宿度上來歲冬至日行至原處不在原宿度上所謂天之分常有餘歲之分常不足也唐堯冬至日在女虛之交至授時所測乃在箕十度以積年而一度分六十六年有奇而日退一度故於二十五分之中減歲實七十五秒秒在分位以益周天使歲周奇分為二十四分二十五秒周天奇分為二十五分七十五秒相減餘一分五十秒是每歲日行不足度之數也積六十六年不足一度與往古退分相合今距辛巳歲三百六十七年黃先生算曆歲在丁亥此辛巳距丁亥算歲周奇分消至二十四分二十二秒周天奇分長至二十五分七十八秒則歲差為一分五十六秒求四正赤道日度置天正冬至加時赤道日度纍加歲象限滿赤道宿次去之各得春夏秋正日所在宿度四正者歲周之四分也二至為二正春分前三日為
