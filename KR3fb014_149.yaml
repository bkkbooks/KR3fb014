body:
  text: 而一滿率法得一分益加損減其下遲疾度爲所求遲疾差定立成術曰置立差三微二十五纖以六因之得一十九微五十纖爲損益立差置平差二秒八十一微倍之得五秒六十二微再加損益立差一十九微五十纖共得五秒八十一微五十纖爲初限平合立差如益分由此以損益立差累加之卽爲每日平合立差至八十限下積至二十一秒四一五爲平合立差之極八十一限下平合立差一秒七八九八十二限下一秒七八八八十三限下平合立差與益分中分爲益分之終八十四限下平合立差與損分中分爲損分之始至八十六限下平合立差亦二十一秒四一五由此以損益立差累減之卽爲每日平合立差至末限與初限同置定平積差一十一分一十一秒內減平差二秒八十一微再減立差三微二十五纖餘一十一分八秒一十五微七十五纖爲初限損益分又以加分定差置損益分以其日平合立差益加損減之卽爲次日損益分以益分積之損分減之便爲其下遲疾度以八百二十分爲一限日率分累加八百二十分卽爲每限遲疾日率分置損益分以日率八百二十分而一滿日率爲秒不
