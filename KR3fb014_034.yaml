body:
  text: 今故分為四限氣象限九十一日三十一刻六分二十五秒歲周四之一上考下驗亦隨歲周為消長盈縮極差二度四十分一十四秒氣象限內減盈縮極差為盈初縮末二限加盈縮極差為縮初盈末二限立差三十一微立者日之上下斜往平差二分四十六秒平者日之東西經行定差五百一十三分三十二秒盈初縮末二曆八十八日九十一刻分為六段以測晷差每段積日得一十四日八十二刻就整每段各測晷差若干為段下積差分如第一段積差七千五十八分二五乃是測晷至十四日八十二比初日所差之數餘仿此第一段積日一十四日八十二刻積差七千五十八分二五第二段積日二十九日六十四刻積差一萬二千九百七十六分三九二第三段積日四十四日四十六刻積差一萬七十六百九十三分七四六二第四段積日五十九日二十八刻積差二萬一千一百四十八分七三二八第五段積日七十四日一十刻積差二萬三千二百七十九分九九七第六段積日八十八日九十二刻積差二萬四千二十六分一八四置第一段下積分七千五十八分二五七千為七十刻即以一段積日一十四日八十二除之餘一千四百八十二分為
