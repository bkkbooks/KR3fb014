body:
  text: 度退為分分滿百為度為定差正交中交後為加半交後為減以加減月離赤道正交後積度為定積度置定積度以正交宿度加之以其所月離白道宿次去之各得定朔弦望加時月離白道宿度白道與赤道正交赤道即為白道不必加減故授時以赤道正交宿度徑加正交後定積度也大統於白赤道交亦求定差加之而後加於正交後定積度疏矣又授時定限度與初末限相減相乘退位為分分滿百為度大統乃約千萬為度推定朔弦望加時及夜半晨昏入轉第十七置經朔弦望入轉日在第一第二條在疾曆以定朔弦望加減差在第四條加減之在遲曆加轉中後以加減差加減之為定朔弦望加時入轉置加時入轉以定朔弦望小餘減之為夜半入轉置夜半入轉以定盈縮曆在第九條日下晨分加之為晨轉昏分加之為昏轉求夜半晨昏月度第十八置定朔弦望小餘以其入轉日轉定度在立成乘之轉定度之十分於小餘首位進一位約萬為分分滿百為度為加時轉度置定朔弦望加時定積度以加時轉度減之餘為夜半定積度以正加宿度加而命之各得夜半月離宿度置其日晨昏分以夜半入轉日轉定度乘之約萬為分分滿百為度為晨昏轉度各加夜半定積度為晨昏定
