body:
  text: 千七百四十七度三二四九二五為從方置初次三啇自之得一十秒七五八四加初次啇自之一十秒二四於內共得二十秒九九八四以減下廉餘四百八十六度九九七九一六以六分四十八秒乘之得三十一度五五七四六三九三為從廉併從方共得一百八十萬三千七百七十八度八八二三八八九三為下法與上法相乘除實餘一百十三度二五五五問半弧背二度下赤道積度若干答曰二度一十七分二十八秒置半徑內減矢度三分二十八秒餘六十度八四二二為黃赤道小弦置黃赤道小弦以黃赤道大股五十六度二六八乘之得三千四百八度七九三七七九六以半徑而一得五十五度九九六六一二為黃赤道小股置矢度三分二十八秒自之得一十秒七五八四以周徑而一得八微八為黃道半背弦差置黃道半背二度內減黃道半背弦差餘為黃道半弧弦今背弦差在微以下不減即二度為黃道半弧弦置黃道半弧弦一度自之得四度為弦畀置黃赤道小股五十五度九九六六一二自之得三千一百三十五度六二五五五四七為股畀二畀相併得三千一百三十九度六二五五
