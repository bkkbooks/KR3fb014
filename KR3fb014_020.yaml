body:
  text: 應為閏積滿翔實去之不盡更置翔實以不盡者減之為閏餘以閏餘減冬至日及分即得天正經翔若冬至不及減者加旬周減之閏應二十萬一千八百五十分辛巳歲前天正經翔距冬至加時刻數測閏應術曰或日食或月食以漏計之至食甚刻分為實如是盈遲作減差以減實是縮疾作加差以加實如午前加時差午後減時差就為經翔分看是何月以距月月數因翔實有閏加一月食之月則用望策得數以加經翔分滿旬周去之得十一月經翔取冬至減經翔即為閏應翔實二十九萬五千三百五分九十三秒測朔實術曰取古所測冬至日時刻密者距今所測冬至日時刻為實另以相距積年乘每歲閏法三分六十八秒二十八微得數定以十分為月得閏月若干及分秒寄位以積年乘每歲十二月得若干月加寄位之閏月分為法除前實是為朔實閏法三分六十八秒二十八微者依祖沖之曆章歲三百九十一章閏一百四十四以章歲一章閏得每歲閏法如宋大明五年冬至十一月初三日乙酉三十二刻六十九分至辛巳歲前冬至十一月二十一日己未六刻得二十九萬九千一百三十三日七十三刻三
