body:
  text: 轉交者依黃道而定月之行也日行出入赤道各二十四度月行又出入日道六度亦二十七日有奇而一周朔者月行二十七日有奇已周天在原與日會之所此二十七日有奇內日亦行過二十七度則月之周天周於會所未周於日故月又行二十七度有奇而及於日同一月行有此三種分別其爲度各異轉終分多於交終分轉終度卽周天度是也交終不及周天一度四六四一卽爲每交退行之度然其爲日交與轉俱歷二十七日有奇至於朔分則歷二十九日有奇矣已上明所以界月行者有三而月之行有遲疾則於入轉明之自月入轉初日至二十七日有奇平分周天爲每日月平行十三度三十六分八十七秒半而月之緯度行長高則遲行最卑則疾遲則不及於平行疾則率過於平行自入轉初日行十四度半強從是漸殺歷七日適及平行度謂之疾初限其積度比平行餘五度四十二分自是其疾日損又歷七日行十二度微強向之益者盡損而無餘謂之疾末限自是復行遲度又歷七日適及平行度謂之遲初限其積度比平行不及五度四十二分自此其遲日損行度漸增又歷七日復行十四度半強向之益者亦損而無餘謂之遲末限今按授時轉終日及月平行一本宋明天厤以其轉分得中平之
