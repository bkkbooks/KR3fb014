body:
  text: 黃赤道矢四度八十四分八十二秒此二至弧背去弧弦之數似矢加弦故曰矢度以周天徑半弧背求矢曰以半弧背自之凡言自之自乘也得五百七十六度爲半弧背畀以周天徑自之得一萬四千八百二十三度六分二十五秒爲徑畀二畀相乘得八百五十三萬八千八十四度爲正實以徑畀乘徑得一百八十萬四千七百七度八十五分九十三秒七五爲益從方以徑畀爲上廉倍半弧背得四十八度以乘周徑得五千八百四十四度爲下廉初啇四度置一於左上爲法置一於左上置四度算左爲法置一四度乘上廉得五萬九千二百九十二度二十五分以減益從方餘一百七十四萬五千四百一十五度六十分九三七五爲從方置一自之得一十六度以減下廉餘五千八百二十八度又以四度因之得二萬三千三百一十二度爲從廉從廉與從方相併共一百七十六萬八千七百二十七度六九三七五爲下法與上法相乘除實下法除一乘上法而除四餘實一百四十六萬三千一百七十三度五六二五次啇八十分置一八十分於左上爲法置一倍初啇共八度八十分以乘上廉得一十三萬四百四十二度九十五分以減益從方餘一百六十七萬四千二百六十四度九九三七五爲從方置一併初啇自
