body:
  text: 滿為微纖即為損益捷法求遲疾曆限術曰置遲疾曆日及分以十二限二十分乘之在八十三限已下為初限已上為末限求日率術曰置所得限限置小分位以日率八百二十分八秒乘之從限首位十進一百進二為日率求損益分術曰置所得限在八十三限己下者不減為初限己上者置一百六十七限以所得限減之餘為末限次以初末限折半又以初末限乘之得數以損益立差一十九微五十纖因之置限小分位立差之十於限首位進一乘之滿萬為分得數寄位又置初限平合立差五秒八十一微半以初末限乘之併寄位為損益定積置初限損益分一十一分八秒一五七五內減去定積餘為所求損益分求遲疾行度術曰置初限行度初限疾行度即末限遲行度一度二七一減去損益定積餘為所求遲疾行度求遲疾積度術曰置立差百之得三秒二十五微為實置中限一百六十八內減所得限初限己下不減竟為法餘為法乘實初末限之十從秒進一位得數加平差二分八十一秒平差百之故得此數再以初末限乘之為定積置定差一千一百一十一分亦百之得此數以定積減之餘再以初末限乘之初末限之十從定差首位進一為所求遲疾積度求朔弦望定日第四經朔弦望盈縮差與遲疾差盈遇遲縮過疾為同則
