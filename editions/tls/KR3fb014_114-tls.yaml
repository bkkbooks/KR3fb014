body:
  text: 八爲黃赤道小弦與黃赤道大股同置黃赤道小弦與黃赤道大股相乘今同卽自之得三千一百三十九度二三一八以半徑而一得五十一度五六四七爲黃赤道小股置矢四度八四八二自之得二十三度五五以周徑而一得一十九分三十秒爲黃道半背弦差在半弧背二十四度內減之餘二十三度八七爲黃道半弧弦置黃道半弧弦自之得五百六十六度七七三二四九爲弦畀置黃赤道小股五十一度五六四七自之得二千六百五十八度九一八二八六九爲股畀二畀相併得三千二百二十五度六九一五三五九以平方法開之得五十六度七九五一爲赤道小弦置黃道半弧弦二十三度八七以乘半徑得一千四百四十九度二五一一二五以赤道小弦而一得二十五度五一七一爲赤道半弧弦置黃赤道小股五十一度五六四七以乘半徑得三千一百三十九度以赤道小弦而一得五十五度二六八八爲赤道横大句又術置半徑自之得三千七百五度七六五六二五爲弦畀以赤道半弧弦二十五度五一七一自之得六百五十一度一二二三九二四一爲股界二畀相較餘三千五十四度六四三二三二五九以平方開之得五十五度二六八八初啇五十度五爲方法除實二千五百度次啇五度倍初啇得一
