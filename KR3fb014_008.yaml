body:
  text: 氣朔厤餘姚黄宗羲棃洲積年辛巳歲卽元至元十八年距今作厤故之歲丙辰積三百九十六年推冬至置所求距歲減一以歲實乘之爲中積加氣應爲通積滿旬周去之不盡以日周約之爲日不滿爲分其日命甲子算外卽所求冬至日辰及分如上考者亦距辛巳歲卽算乘歲實爲中積減氣應爲通積滿旬周去之不盡更置旬周以不盡者減之餘同上歲實亦名歲周三百六十五萬二千四百二十五分上考者每百年周天消一秒歲實長一分下驗每百年周天長一秒歲實消一分劉宋祖沖之取至前後二十三四日閒晷影折取其中定爲冬至且以日差比課推定時刻宋皇祐閒周琮則取立冬立春二日之景以爲去至旣遠日差頗多易爲推考授時取前後日率相埒者自遠日以及近日無不可測舊法用八尺表授時用長表四丈爲八尺者五旣定分至然後可定歲實測景術曰置冬夏二至前後日之相對者以圭表所測正午晷景日日識之相減爲晷差進二位爲實次
