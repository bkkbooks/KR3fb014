body:
  text: 以黃道率乘之每率一度乘餘一分為一度如赤道率而一滿度率為一分所得以加黃道積度為二十八宿黃道積度以前宿黃道積度減之為其宿黃道度其秒就近為分黃道宿次角十二八十七亢九五十六氐十六四十房五四十八心六二十七尾十七九十五箕九五十九右東方七宿七十八度一十二分斗二十三四十七牛六九十女十一一十二虛九七十五秒危十五九十五室十八三十二璧九三十四右北方七宿九十四度一十分七十五秒奎十七八十七婁十二三十六胃十五八十一昴十一八分畢十六五十觜初五分右西方七宿八十三度九十五分井三十一三分鬼二一十一柳十三星六三十一張十七七十九翼二十九分軫十八七十五右南方七宿一百九度八分授時黃道宿度依赤道及冬至歲差所在算定若上下考驗歲差每移一度依術推變各得當時宿度凡上下消長皆從虛度元辛已歲前冬至後赤道距後度四十分以其赤道積度減之無減餘以黃道率乘之得四十度如赤道率一度八六五而一得三十六分八十一秒以加
