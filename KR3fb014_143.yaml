body:
  text: 中限一百六十八半周限猶日行半歲周月平行十三度三十六分八十七秒半每日行度大略限平行度一百九分六十三秒以限法八百二十分乘月平行百約之立差三微二十五纖平差二秒八十一微定差一十一分一十一萬轉周日二十七日五十五刻四十六分計七段測分四象四七該二十八段每段十二限每一象八十四限共一周四象該三百三十六限每轉周日以四象而一得每象六日八八八六五就整為七日即七段也每段十二限即每日積十二限月與日立法同但太陽盈縮異數太陰遲疾同原每象八十四限以七段測每段十二限各段下實測晷差若干為各段遲疾度差分如第一段遲疾差一度二十八分七一二乃是測晷至十二限比初限所差之數餘仿此積限積差第一段一十二一度二十八分七一二第二段二十四二度四十五分九六一六
