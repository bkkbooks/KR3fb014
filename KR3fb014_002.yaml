body:
  text: 者明元統大統曆法通軌而已故平立定三差弧矢割圓諸術深知其意者絶少天啓崇禎間西法漸行大統説益絀梨洲先生因委尋源釐成此卷嗣君百家本其家學以入史局明史初藳於大統曆法先列法原未必不由於此則此書於授時厥功偉矣嘗疑言授時者明史藳所采尚有數種而四庫絶無著録此書亦在所遺何也全榭山為先生碑云此書一卷今乃四卷據歲差條下注云黃先生算曆歲在丁亥則此書己經後人更定非先生原本可知本文誤者惟祖沖之日景算術一條注文則每有訛誤茲皆一一訂正之道光丙申孟冬朔後學江陰宋景昌
  hash: sha256:824bae49581805fea5232f0f8e31765cb8d6546cea17a69cf7178470abe423d5
