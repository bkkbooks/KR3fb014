body:
  text: 之得四度以周徑乘之得四百八十七度為下廉初啇三分置一於在上為法置一乘上廉得四百四十四度六九一八七五以減益從方餘一百八十萬四千二百六十三度一六七五為從方置初啇三分自之得九秒以減下廉餘四百八十六度九九九一以初啇三分乘之得一十四度六九九七三為從廉併從方共一百八十萬四千二百七十七度七七七四七三為下法與上法相乘除實置三分進六位乘一百萬起餘五千一百六十三度九一六六七五八一次啇二十秒置一於在上為法置一倍初啇得六分二十秒乘上廉得九百一十九度二九八七五以減益從方餘一百八十萬三千七百八十八度八二九五為從方置初次啇三分二十秒自之得一十四秒二四加初啇三分自之之數得一十九秒二四以減下廉餘四百八十六度九九八七六以前所得六分二十秒乘之得三十度一九三八八七一二為從廉併從方共一百八十萬三千八百一十九度二三三八七一二為下法與上法相乘除實置二十秒進六位起乘百萬餘一十五百五十六度二七八六二九五三啇八秒置一於在上為法置一陪初次啇共得六分四十八秒以乘上廉得九百六十度五三四四五以減益從方餘一百八十萬三
