body:
  text: 盈初限八十八日九千九十二分二十五秒盈末限九十三日七千一百二十分二十五秒縮初限九十三日七千一百二十分二十五秒縮末限八十八日九千九十二分二十五秒赤道當南北極之中北高南下日行南陸為赤道之外行卑則近故一日而一度強日行北陸為赤道之內行高則遠故一日而一度弱此日不平行之故也盈初者冬至出赤道二十四度弱自此日軌漸北至春分前三日積八十八日九十一分就整而行九十一度三十一分交在赤道盈末者自春分前三日至夏至日由赤道而入赤道內二十四度弱積九十三日七十一分而行九十一度三十一分縮初者夏至日軌漸南至秋分後三日積九十三日七十一分而行九十一度三十一分交在赤道縮末者自秋分後三日至冬至日由赤道而出二十四度弱積八十八日九十一分而行九十一度三十一分盈末之行縮二度四十分何以謂之盈也以盈初之盈未盡故亦謂之盈縮末之行盈二度四十分何以謂之縮也以縮初之縮未補故亦謂之縮盈初縮末縮初盈末舊分二限其求初末限去盈者視盈初縮末曆縮者視縮初盈末曆夫縮末雖與盈初同限實為縮曆盈未雖與縮初同限實為盈曆而二限分屬盈縮非也
