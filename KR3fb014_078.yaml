body:
  text: 未鶉首夏至後四度一四三六井八度三四六四二十八度六五九七午鶉火三十二度八三三柳三度八六八三十度七二五己鶉尾六十三度五五八張十五度二六六三十二度六九六七辰壽星秋分後四度八九一二軫十度一七九七三十二度二四三九卯大火三十七度一三五一氐一度一四五二三十度二八六寅折木六十七度一六三七尾三度一一五二十八度三一一丑星紀冬至後四度一五五斗三度七六八五二十八度六四九八推宫界積度曰置四正後入宫宿度加入宫宿度前一宿度共得數為宫界積度黃道斗三度九六八五入丑加前宿箕九度五九共得一十三度五五八五為冬正宫界積度奎一度七三六三入戌加前宿璧九度三四共得一十一度七六三為春正後宫界積度井八度三四六四入未加前宿參一十度二八共得一十八度六二六四為夏正後宫界積度軫十度七九七入辰加前宿翼二十度九共得三十度一六九七為秋正後宫界積度其餘宫界依四正積入不自起積求交宫鈐度即如前以四五後入宫宿度前一宿起積不連宫界宿便為交宫鈐度置宫界積度減交宫鈐度即黃道十二次初界度宫界積度交宫鈐度
