body:
  text: 一刻得四百七十六分二十五秒四百為四刻為第一段平差分是每日平差置第二段下積分一萬二千九百七十六分三九二即以第二段積日二十九日六十四除之餘二千九百六十四分為一刻得四百三十七分八十秒為第二段平差分置第三段下積分一萬七十六百九十三分七四六三即以第三段積日四十四日四十六除之得四千四百四十六分為一刻得三百九十七分九十七秒為第三段平差分置第四段下積分二萬一千一百四十八分三二八即以第四段積日五十九日二十八除之以五千九百二十八分為一刻得三百六十五分七十六秒為第四段平差分置第五段下積分二萬三十二日七十九分九九七即以第五段積日七十四日一十除之除七千四百一十分為一刻得三百一十四分一十七秒為第五段平差分置第六段下積分二萬四千二十六分一八四即以第六段積日八十八日九十二除之除八千八百九十二分為一刻得二百七十分二十秒為第六段平差分置第一段平差分四百七十六分二十五秒與第二段平差四百三十七分八十秒前後相減餘三十八分四十五秒為第一段一差乃初日至十四日八十二刻共差之數置第二段平差分與第三段平差分相減餘三十九分八十三秒為第二段一差乃第十四日八十二刻至二十九日六十四刻
