body:
  text: 日躔曆餘姚黃宗羲梨洲推天正經翔入轉第一置中積加轉應減閏餘滿轉終去之餘為天正經朔入轉日及分上考者置中積加閏餘減轉應滿轉終去之不盡更置轉終以不盡者減之餘同上轉終二十七日五十五刻四十六分亦名轉周月行一周天之數測月之法大都與測日同然日測正午月則測到天中自某日至某日止以漏水記之以月行或最高或最低前後距所相對日圭表所測月到天中之晷以相連二日景相減為法仍以前後
