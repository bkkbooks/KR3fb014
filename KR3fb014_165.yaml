body:
  text: 度差乘之仍二度三十七分為小股又為容半長自之得五度六一六九赤為容半長畀與寄左相消得數以平方開之得五度七十分為弧矢容闊又為小勾以度差乘之得一十三度四十七分八十二秒為容半長置大弦即周天半徑以小勾五度七十分乘之以大勾二十三度七十一分而一得一十四度六十三分為小弦又為白赤道正交距黃赤道正交半弧弦求得半弧背一十四度六十六分為白赤道正交距黃赤道正交極數
