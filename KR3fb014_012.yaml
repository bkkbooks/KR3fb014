body:
  text: 千刻此冬至前少後多故加半之加半日刻得一千五十八刻百約爲十日餘以十二乘之百約爲時滿之五十又進一時共得七時餘以十二收爲刻命初起距日戊戌算外得戊申日未初三刻爲戊寅歲冬至此取至前後十日景又戊寅歲十一月十二日辛夘景七丈五尺八寸八分一釐五毫十三日壬辰景七丈六尺三寸一釐五毫閏十一月十五日甲子景七丈六尺三寸六分六釐五毫十六日乙丑景七丈五尺九寸五分三釐十七日丙寅景七丈五尺五寸四釐五毫用壬辰甲子景相減爲實或以辛邜壬辰景相減爲法除之或以甲子乙丑景相減爲法除之皆得戊申日未初三刻若用辛邜己丑景相減爲實以乙丑丙寅景相減除之亦同此取至前後十六七日景此授時彷祖沖之所立法也祖沖之法又少異如劉宋大明五年十月十日景一丈七寸五分半十一月二十五日一丈八寸一分太二十六日一丈七寸五分強折取其中則中天冬至應在十一月三日以上定日求其蚤晚令後二日景相減餘六分則一日差率也倍之爲法十二前二日咸宋書誤減字以百刻乘之爲實謂十月十日十一月二十五日二日前後相距四十四日以百刻乘之得四千四百刻也以法除實得冬至加時在夜半後三十一刻按以十二除實當得三十五刻此少四刻未詳若以授時之法定祖沖之所測以十月十日癸亥十一
