body:
  text: 授時厤故四卷黄宗羲棃洲撰蓋因郭守敬厤艸不傳而作步算之法自漢太初大衍而後伍立一術輒更一元以爲起算之根然必上推至七曜齊同之歲厤紀邈遠未易密合元授時術不用積年日法憑本年實測所得氣閏諸應上考下求卽以至元辛已爲元此爲變古之一大端惟所測歲實定爲每百年消長一分江氏永謂消長有漸不應總計分數以乘距算此其疏也明大統俗悉遵授時獨不用百年消長之法以至中節相差九刻積年旣久差數愈顯後人并歸咎於授時然七政行度有差當隨時實測以合天行至其法實集諸家之大成惜厤艸不傳見於明元統所撰大統通軌者尙可攷見宣成梅氏據以較授時閏應轉應交應諸已有不同頗疑大統或有改定夫大統旣用授時之元合用授時之數乃獨於閏轉諸應數有更則定朔置閏月離交食之期又安所捦衷此梅氏所以不能無疑也棃洲先生撰授時厤故一依本法推算其所剏平定立三差及弧矢割圓諸法賴此以存謂非守敬功臣歟宋李希眞避地廣中詩云藤州三月作小盡梧州三月作大盡哀哉官厤今不頒憶昔升平淚成陣三作復斯言感慨系之此本傳自武進李氏休從曹君直侍讀借鈔得之兹更詳校正付梓俾言厤者有所攷證庶幾告朔餼羊之意也夫癸亥除夕吳興劉承幹跋
