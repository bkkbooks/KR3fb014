body:
  text: 十三度四二五六共四十六度九二八七四以減下廉餘五千七百九十七度七一二九六又以九度六七八分八十秒乘之得五萬六千一百六十二度二六七一五六四八爲秒廉併從方共一百七十一萬七千二百六十四度五六五九六四八爲下法與上法相乘除實一除八餘四百四十八度五三三四七六三四八一六次啇二秒置一二秒於左上爲法置一倍初次三四啇共九度六十九分六十二秒以乘上廉得一十四萬三千七百二十七度三七八六一二五以減益從方餘一百六十六萬九百八十度四八七六二五爲從方置一併初次三四啇自之得二十三度五五四三二四加初次三啇自之二十三度五三一四共四十七度八一四七二四以減下廉餘五七七百九十六度九九一八五二七六又以九度六十九分六十二秒乘之得五萬六千二百八度七九二四三七三一五一二爲從廉併從方共一百七十一萬七千一百八十九度二七三一六五二三一五一二爲下法與上法相乘除實一除二餘一百五度九五五五三一七六九六九七六不滿一秒之數得矢四度八十四分八十二秒黃赤道大股五十六度二分六十八秒
