body:
  text: 冬至後入丑星紀斗一十三度三五八五箕九度五九大寒後入子玄枵女四十二度二三八牛三十九度九六雨水後入亥娵訾危七十二度七三六六虛六十度八七五春分後入戌降婁奎一十一度七六三璧九度三四穀雨後入酉大梁胃四十三度三一五六婁三十九度五七小滿後入申實沈畢七十三度三四五昴六十六度四六夏至後入未鶉首井一十八度六二六四參一十度二八大暑後入午鶉火柳四十七度二八八鬼四十三度四二處暑後入巳鶉尾張七十七度九九六星六十二度七三秋分後入辰壽星軫三十度一六九七翼二十度九霜降後入邜大火氐六十二度四一五二亢六十一度二七小雪後入寅析木尾九十二度四三一五心八十九度四二推入十二次時刻置入次宿度及分秒視得次在某日以其晨前夜半日度減之餘以日周乘爲實乘一分爲萬分以其日行定度卽日差加減每日行度爲法實如法而如行度度爲一分所得依發斂求之卽入次時刻授時厤故卷二
