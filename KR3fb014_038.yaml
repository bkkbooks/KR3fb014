body:
  text: 共差之數置第三段平差分與第四段平差分相減餘四十一分二十一秒為第三段一差二十九日六十四刻至四十四日四十六刻差數置第四段平差分與第五段平差分相減餘四十二分五十九秒為第四段一差四十四日四六至五十九日二八共差之數置第五段平差分與第六段平差分相減餘四十三分九十七秒為第五段一差五十九日二十八刻至七十四日一十刻共差之數置第一段一差與第二段一差相減餘一分三十八秒為第一段二差置第二段一差與第三段一差相減置第三段一差與第四段一差相減置第四段一差與第五段一差相減俱餘一分三十八秒為各段二差此每日所差之數各段平差一差二差立成二差一差平差一分三十八秒三十八分四五秒四百七六分二十五秒一分三十八秒三十九分八十三秒四百三十七分八十秒一分三十八秒四十一分二十秒三百九十七分九十七秒一分三十八秒四十二分五九秒三百五十六分七十六秒四十三分九十七秒三百一十四分一十七秒三百七十分二十秒置第一段平差四百七十六分二十五秒為泛平積以第一段一差三十八分四十五秒加減第一段二
