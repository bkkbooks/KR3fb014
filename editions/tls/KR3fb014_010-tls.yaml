body:
  text: 取後二日相連之景相減爲法實如法而一冬至景前多後少爲減差後多前少爲加差夏至景前少後多爲減差後少前多爲加差皆加減相距日得數半之加半日刻命起日算外滿百刻爲日餘以發欽收之爲時刻及分假如丁丑歲元至元十四年十一月十四日己亥景長七丈九尺四寸八分五釐五毫至二十一日丙午景長之七丈九尺五寸四分一釐二十二日丁未景長七丈九尺四寸五分五釐以己亥丁未二日之景相較餘三分五毫爲晷差進二位三尺五分以丙午丁未二日之景相較餘八分六釐爲法而一得三十五刻以八分六釐爲一刻用減相距日八百刻此冬至前多後少故減餘七百六十五刻析取其中加半日刻共四百三十二刻半百約爲日得四日餘以十二乘之百約爲時得三時滿五十又作一時共得四時餘以十二收之得三刻命初起距日己亥算外得癸邜日辰初三刻爲丁丑歲冬至此取至前後四日景又如戊寅歲元至元十五年十一月十九日戊戌景七丈八尺三寸一分八釐五毫至閏十一月初九日戊午景七丈八尺三寸六分三釐五毫初十日己未景七丈八尺八分二釐五毫用戊戌戊午二日景相減餘四分五釐爲晷差進二位四尺五寸以戊午己未景相減餘二寸八分一釐爲法而一得一十六刻以二寸八分一釐爲一刻加相距日二
