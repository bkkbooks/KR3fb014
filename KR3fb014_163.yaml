body:
  text: 朔中積不著加減大統乃徑以盈縮厤爲中積非也推定差距差定限度第十置冬至距正交定積度在半歲周已下爲冬至後己上去之爲夏至後半歲一百八十二日六二一二五其二至後在象限己下爲初限己上於半歲周內減去二至後度分餘爲末限置初末限度以十四度六十六分乘之如象限九十一度三一四三而一如象限爲一度爲定差置十四度六十六分減去所求定差餘爲距差置定差以二十四度乘之如十四度六十六分而一如上爲一度所得交在冬至後名減夏至後名加皆加減九十八度爲定限度去赤道內外一十八度定限度七十四度去三十度定限度一百二十二度推白赤道正交距黃赤道正交極數術曰白道出入黃道六度便爲半弧弦又爲大圓弧矢又爲股弦差置周天半徑六十度八十七分五十秒自之得三千七百五度七六五六二五以矢六度而一六度爲一度得六百一十七度六十三分爲股弦和加矢六度共六百二十三度六十三分爲大圓徑立天元一爲容直闊去減六度餘爲截矢置大圓徑以矢減之餘六百一十七度六三以截矢乘之爲容半長畀寄左又以二至出入半弧弦二十三度七十一分爲大勾餘大股五十六度六分五十秒如大勾爲一度得二度三十七分就整爲度差置天元一度爲小勾以
