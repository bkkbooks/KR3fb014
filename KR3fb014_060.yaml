body:
  text: 黃道積度無加即為冬至後黃道積度三六八一置冬至赤道距後度二十五度六十分以其黃道積度二十四度七二二二減之餘八七七八以黃道率一度乘之得八十七度七十八分如赤道率一度五三而一得八三三六以加黃道積度二十三度共得二十三度八三三六以前宿黃道積度箕宿三六八一減之餘為斗二十三度四六五五置冬至赤道距後度三十二度八十分以其赤道積度三十二度四一八減之餘七五八二以黃道率一度乘之得七十五度八十二分如赤道率一度三五五而一得七三二二以加黃道積度三十度共三十度七三二二為所求黃道積度以前宿黃道積度二十三度八三三六減之餘為牛六度八九八七收八十七秒作一分共九十分四正黃道距後度黃道宿次黃道約分冬正後二十三度八三三六斗二十三四六五五二十三四七三十七三二二牛六八九八六六九四十一八五二女十一一一八十一一二五十八四八九虛八九九八七九七十五秒六十六七九六危十五九四七一十五九五八十五一一八六室十八三二二六十八三二春正後三度一四璧九三四二五九三四
