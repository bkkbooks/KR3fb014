body:
  text: 之得二百七十四度五五二五一二四以周徑而一得二度二五四六爲黃道背弦差以減半背四十四度餘四十一度七四五四爲黃道半弧弦又術置半徑自之得三千七百五度七六五六二五爲弦畀置黃赤道小弦四十四度三六八自之得一千九百六十三度九二五二六二四爲股畀二畀相較餘一千七百四十二度三九八七六以平方開之得四十一度七四五三爲黃道半弧弦以減半背四十四度餘二度二十五分四十七秒爲黃道背弦差置黃道半弧弦自之得一千七百四十二度六七八四二一一六爲弦畀置黃赤道小股四十度七七八一自之得一千六百六十二度八五三四三九六一爲股畀二畀併得三千四百五度五三一八六七七以平方開之得五十八度三五六九爲赤道小弦置黃道半弧弦四十一度七四五四以乘半徑得二千五百四十一度五一二二五以赤道小弦而一得四十三度五四六七爲赤道半弧弦置黃赤道小股四十度七七八一乘半徑得二千四百八十二度三六六八三七五以赤道小弦而一得四十二度五三七六爲赤道横大句又術半徑自之爲弦畀赤道半弧弦自之爲股畀二畀相減餘開方之亦得横大句以赤道横大勾減半徑餘一十八度三三七四爲赤道弧矢置赤道弧矢自之得三百三十六度二六二三八七六以周徑而一得二度七六一八爲赤道背弦差加入赤道半弧弦內共得四十六度三八五爲赤道積度
