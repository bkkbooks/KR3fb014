body:
  text: 差一分三十八秒前多後少加前少後多減今前少一差俱前少後多應於三十八分四十五秒內減一分三十八秒餘三十七分七秒為泛平積差另置第一段二差一分三十八秒折半得九六十九秒為泛立積差置泛平積四百七十六分二十五秒加減泛平差三十七分七秒前多後少加前少後多減今前多平差俱前多後少應於四百七十六分二十五秒內加三十七分七秒共積五百十三分三十二秒為定平積即定差五百一十三萬三千二百之數置泛平差三十七分七秒加減泛立差六十九秒今前少泛平從第一段一差來故前少應於三十七分七秒內減六十九秒餘三十六分三十八秒為定平差置泛立差六十九秒以段日一十四日八十二除二次得三十一分置六十九秒除一十四秒八十二微為一十微初次除得四十微六五五九除二次得九十三微一一八後以三為一故得三十一微零不用為日立差分即微置定平差三十六分三十八秒以段日一十四日八十二除一次得二分四十六秒除一十四分八十二秒為一分為日定平差萬定分立差二十七微平差二分二十一秒定差四百八十七分六秒縮初盈末二曆九十三日七十一刻離為六段以測
