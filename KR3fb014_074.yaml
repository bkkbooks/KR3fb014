body:
  text: 亥歎訾危十二度六十五度三六六十五度三六二六一五六二五九六二五九六二五戍降婁奎一度五九十五度八春分後四度四九九六八七五七一八七五九六五六二五酉大梁胃三度六一百二十六度二三十四度九三三七八一二五四五三一二五四六八七五申實沈畢七度一一百五十六度六六十五度三六七五九三七五八三四三七五二八一二五未鶉首井九度一百八十七度四夏至後四度五六四六二五二五六二五三一二五午鶉火柳四度二百一十七度五三十四度九三二一八七五五九六八七五八四三七五己鶉尾張十四度二百四十七度九六十五度三七八四三一二五九七八一二五六五六二五辰壽星軫九度二二百七十八度四秋分後四度五七八四三七五三五九三七五四六二五卯大火氐一度一三百八度八七三十四度九四一六五六二五四六二五二一八七五寅析木尾三度一三百三十九度三六十五度三八五四六八七五一二一八七五三一二五丑星紀斗四度四度五七冬至後四度五九二八一二五八一二五七八一二五推黃道十二次宿度日置四正後所推赤道積度以四正後赤道積度在黃赤道率減之餘以黃道率乘之如赤率而一得數以加黃道積度以前四正後黃道積度減之餘各得十二次宿度分前後積度相減餘爲界次置辛巳歲前冬至後赤道子玄枵積度三十四度九三九三七五以減冬至後三十二度下赤道積度三十四度一一五餘八十二分四三七五以黃道一度乘之以赤道度率一度三六而一得七十九分六以加於黃道三十二度下共得三十二度七九六爲子玄枵女下黃道積度置女三十二度七九六以四正黃道距後積度
