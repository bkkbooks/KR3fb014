body:
  text: 推虛日古謂之滅視經朔小餘在朔虛已下爲有虛以三十日乘之滿朔虛而一爲日加入經翔大餘內滿旬周去之命甲子算外卽得朔虛四十六刻九十四分七秒以翔策減三十日推五行用事各以四立之節爲春木夏火秋金冬水首用事日置四季中氣日及分秒穀雨大暑霜降大寒減土王策各得其季土始用事日土王策三日四刻三十六分八十七秒五十微又名貞策置歲實以五行而一得七十三日四刻八十五分是每行所王之數置氣策五以五分之一減之得貞策候策置歲實以七十二候而一卽得各分氣候立春正月節雨水正月中驚蟄二月節春分二月中清明三月節穀雨三月中
  hash: sha256:6ff01d9842b245d558a45c626f311fce6c669c5d7cfec28139f7167607b16032
