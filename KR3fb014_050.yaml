body:
  text: 赤道宿度角十二一十亢九二十氐十六三十房五六十心六五十尾十九一十箕十四十右東方七宿七十九度二十分斗二十五二十牛七二十女十一三十五虛八九十五分七十五秒危十五四十室十七一十壁八六十右北方七宿九十三度八十分七十五秒奎十六六十婁十一八十胃十五六十昴十一三十畢十七四十觜初五參十一一十右西方七宿八十三度八十五分井三十三三十鬼二二十柳十三三十星六三十張十七二十五翼十八七十五軫十七三右南方七宿一百八度四十分授時所測經星度與往古有異若上考則依各代所測推冬至赤道日度置中積加周應為通積滿周天分去之不盡以日周約之為度不滿退約為分秒命起赤道虛宿六度外去之至不滿宿即所求冬至日𨇠赤道宿度及分秒上考者置中積減周應為通積滿周天去之不盡另置周天以不盡者減之餘同上周天三百六十五度二十五分七十五秒上推往古每百年消一下算將來每百年長一消長皆秒
