body:
  text: 上者虛進一日後代皆循用之然虞𠠎常曰朔在會同茍纏次旣合何疑於頻大日月相離何拘於頻小一行亦曰天事誠密但取辰集時刻所在之日以爲定朔雖小餘在進限亦不可進其言皆是也蓋盈加而定朔在經朔後名曰朒縮減而定朔在經朔前名曰朓定弦定望亦如之卽今厤求盈縮遲疾加減差之謂也然朔不復進而弦望猶退凡月帶食於日出時雖屬次日只以其夜言望故日出分之前應退一日以其便於推步耳推定朔弦望加時日月宿度第五置經朔弦望盈縮厤推盈縮厤見日𨇠厤各以加減差推加減差見求朔弦望定日下加減之爲定盈縮厤在盈便爲中積在縮加半歲周爲中積命日爲度以盈縮差盈加縮減之爲加時定積度置加時定積度加入冬至加時日𨇠黃道宿度推冬至黃道日度見日𨇠厤滿黃道宿次去之各得定朔弦望加時日度凡合朔加時則日月同度故定朔加時日度便爲定朔加時月度若弦望則於加時定積度內又加弦望度爲定弦望月行定積度置定弦望月行定積度加入冬至加時黃道日度滿黃道宿次去之各得定弦望加時黃道月度望一百八十二度六十二分八十七秒半上弦九十一度三十一分四十三秒半
